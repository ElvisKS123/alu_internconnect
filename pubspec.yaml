name: alu_internconnect
description: ALU InternConnect - Connecting ALU students with student-led startups
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  firebase_messaging: ^16.4.1

  # State Management - BLoC / Cubit
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Navigation
  go_router: ^12.1.3

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0
  badges: ^3.1.2
  dotted_border: ^2.1.0

  # Utils
  intl: ^0.18.1
  timeago: ^3.6.0
  url_launcher: ^6.2.2
  image_picker: ^1.0.5
  shared_preferences: ^2.2.2
  uuid: ^4.2.2
  rxdart: ^0.27.7

  # Forms
  formz: ^0.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  bloc_test: ^9.1.5
  mocktail: ^1.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
